name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: "Release version type"
        required: true
        default: "patch"
        options:
          - major
          - premajor
          - minor
          - preminor
          - patch
          - prepatch
          - prerelease
      tag:
        type: choice
        description: "npm dist-tag"
        required: true
        default: "latest"
        options:
          - latest
          - next
          - beta
          - alpha
          - canary
      dry_run:
        type: boolean
        description: "Dry run (no publish/tag)"
        required: true
        default: false
      skip_npm:
        type: boolean
        description: "Skip npm publish (git tag + GitHub release only — reconcile after a partial release)"
        required: true
        default: false

permissions:
  contents: write
  # Required to publish to npm with provenance.
  id-token: write
  # Required to open the master -> develop back-merge PR.
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Node 22 ships npm 10, which resolves deps differently than the npm 11
      # used to generate the lockfile. Pin an exact npm 11 so `npm ci` stays in
      # sync and releases are reproducible (matches the addon-bone pipeline).
      - name: Update npm
        run: |
          npm i -g npm@11.7.0
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # release-it runs the whole lifecycle: bump -> npm publish -> commit -> tag
      # -> push -> GitHub release. npm publish uses OIDC Trusted Publishing (no
      # NPM_TOKEN; needs id-token: write + npm >= 11.5.1 + publishConfig.provenance).
      - name: Release
        run: |
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          SKIP_NPM=""
          if [ "${{ inputs.skip_npm }}" = "true" ]; then SKIP_NPM="--no-npm.publish"; fi
          npx release-it ${{ inputs.version }} --npm.tag=${{ inputs.tag }} $DRY $SKIP_NPM --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # release-it@17 passes `log: this.config.isDebug ? console : null` to
          # Octokit; without DEBUG, isDebug is false -> log is null -> the
          # GitHub-release step crashes on `log.debug`. Setting DEBUG makes it
          # log to console instead. (Same fix the addon-bone pipeline uses.)
          DEBUG: "release-it:*,@release-it/*"
          # Machine-generated commit — skip husky commit-msg/pre-commit hooks in CI.
          HUSKY: "0"

      # After a real release, open a PR to merge the release commit (version bump
      # + changelog) from master back into develop so develop never drifts.
      - name: Back-merge release into develop
        if: ${{ !inputs.dry_run }}
        run: |
          gh pr create --base develop --head master \
            --title "chore: back-merge release into develop" \
            --body "Automated sync of the release commit (version bump + changelog) from master." \
            || echo "No back-merge PR created (already open or nothing to merge)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
