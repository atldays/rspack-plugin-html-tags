name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: "Release version type"
        required: true
        default: "patch"
        options:
          - major
          - premajor
          - minor
          - preminor
          - patch
          - prepatch
          - prerelease
      tag:
        type: choice
        description: "npm dist-tag"
        required: true
        default: "latest"
        options:
          - latest
          - next
          - beta
          - alpha
          - canary
      dry_run:
        type: boolean
        description: "Dry run (no publish/tag)"
        required: true
        default: false

permissions:
  contents: write
  # Required to publish to npm with provenance.
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      # Node 22 ships npm 10, which dedupes some deps differently than the npm 11
      # used to generate the lockfile. Pin npm 11 so `npm ci` stays in sync.
      - name: Pin npm to 11
        run: npm i -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: |
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          npx release-it ${{ inputs.version }} --npm.tag=${{ inputs.tag }} $DRY --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
